name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:

  # :hammer: BUILD + PUSH JOB..
  build:
    runs-on: ubuntu-latest

    steps:
      - name: :inbox_tray: Checkout Code
        uses: actions/checkout@v3

      - name: :closed_lock_with_key: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: :hammer: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-demo:latest .

      - name: :outbox_tray: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-demo:latest


  # :test_tube: TEST JOB
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: :inbox_tray: Pull Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/devops-demo:latest

      - name: :test_tube: Test Container
        run: |
          docker run -d -p 8080:80 --name test-container ${{ secrets.DOCKER_USERNAME }}/devops-demo:latest

          sleep 10

          curl -f http://localhost:8080

          docker rm -f test-container


  # :rocket: DEPLOY JOB
  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: :rocket: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "Connected to EC2"

            # Install Docker if not installed
            if ! command -v docker &> /dev/null
            then
              echo "Installing Docker..."
              sudo yum install docker -y
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            # Pull latest image
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/devops-demo:latest

            # Stop old container
            sudo docker rm -f nginx-container || true

            # Run new container
            sudo docker run -d -p 80:80 --name nginx-container \
              ${{ secrets.DOCKER_USERNAME }}/devops-demo:latest

            sudo docker ps
